# Deploy FrontEnd to GitHub Pages on push to main.
# Enable once: Repo Settings → Pages → Source: GitHub Actions
#
# Optional: Settings → Secrets and variables → Actions → Variables
#   VITE_API_URL = your public HTTPS gateway (overrides the default below)

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "FrontEnd/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: FrontEnd/package-lock.json

      - name: Build FrontEnd
        working-directory: FrontEnd
        env:
          VITE_BASE_PATH: /Agile-SMU-Final-Project/
          # Override via repo variable VITE_API_URL when your gateway is deployed publicly
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          DEFAULT_API_URL: http://localhost:5000
        run: |
          if [ -z "$VITE_API_URL" ]; then
            export VITE_API_URL="$DEFAULT_API_URL"
            echo "::warning::VITE_API_URL not set — using $DEFAULT_API_URL. API calls from GitHub Pages will not work until you add repository variable VITE_API_URL with your public gateway URL."
          else
            echo "Building with VITE_API_URL=$VITE_API_URL"
          fi
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: FrontEnd/dist

      - uses: actions/deploy-pages@v4
        id: deployment

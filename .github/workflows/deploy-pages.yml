# Deploy FrontEnd to GitHub Pages on push to main.
# Enable once: Repo Settings → Pages → Source: GitHub Actions
# Set repo variable: VITE_API_URL = your public HTTPS gateway URL

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "FrontEnd/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: FrontEnd/package-lock.json

      - name: Build FrontEnd
        working-directory: FrontEnd
        env:
          VITE_BASE_PATH: /Agile-SMU-Final-Project/
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: |
          if [ -z "$VITE_API_URL" ]; then
            echo "::error::Set repository variable VITE_API_URL (Settings → Actions → Variables)"
            exit 1
          fi
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: FrontEnd/dist

      - uses: actions/deploy-pages@v4
        id: deployment
